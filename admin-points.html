<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="캐치캐치 관리자 · 포인트 현황 및 강제 조정">
  <title>포인트 관리 · 캐치캐치 관리자</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="js/admin-auth.js"></script>
  <script>AdminAuth.requireLogin();</script>
</head>
<body>
  <header class="admin-bar">
    <a class="admin-brand" href="admin-dashboard.html">캐치캐치 <span>ADMIN</span></a>
    <nav aria-label="관리자 메뉴">
      <a href="admin-dashboard.html">대시보드</a>
      <a href="admin-users.html">사용자</a>
      <a href="admin-products.html">상품</a>
      <a href="admin-seller-applications.html">입점심사</a>
      <a href="admin-sellers.html">입점업체</a>
      <a href="admin-coupons.html">쿠폰</a>
      <a class="is-current" href="admin-points.html">포인트</a>
      <a href="admin-qna.html">Q&amp;A</a>
      <a href="admin-settlements.html">정산</a>
    </nav>
    <div class="admin-actions">
      <a href="index.html">쇼핑몰 보기</a>
      <a href="admin-login.html" data-admin-logout>로그아웃</a>
    </div>
  </header>

  <main class="admin-page wrap">
    <div class="page-head">
      <div>
        <p class="kicker">POINT MANAGEMENT · A-POINT-001~002</p>
        <h1>포인트 관리</h1>
        <p class="desc">사용자별 포인트 적립·차감 현황을 조회하고, 비정상 포인트를 강제로 조정(가감)합니다.</p>
      </div>
      <span class="preview-badge">실시간 데이터 · /api/v1/admin/users/points</span>
    </div>

    <div class="toolbar">
      <label class="search-box">
        <svg class="icn" viewBox="0 0 24 24" style="width:15px;height:15px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input type="text" id="q" placeholder="이름·사용자ID 검색">
      </label>
      <span class="count">총 <b id="count">0</b>명</span>
    </div>

    <div class="table-wrap">
      <table class="data">
        <thead>
          <tr>
            <th>사용자ID</th>
            <th>이름</th>
            <th class="num">보유 포인트</th>
            <th class="num">누적 적립</th>
            <th class="num">누적 사용</th>
            <th>최근 변동</th>
            <th>강제 조정</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <div class="pager">
      <button type="button">‹</button>
      <button type="button" class="on">1</button>
      <button type="button">›</button>
    </div>
  </main>

  <script src="js/admin-ui.js"></script>
  
  <script src="js/admin-api.js"></script>
  <script src="js/admin-points.js"></script>
</body>
</html>
