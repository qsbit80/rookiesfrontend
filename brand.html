<main class="wrap brand-page">

<!-- ▼▼▼ 브랜드 목록 =====================================
     ※ 기능정의서 보완 — 입점 브랜드 조회
     - 브랜드 목록 조회 : GET /api/v1/brands (제안)
     - 브랜드 찜        : POST /api/v1/brands/{brandId}/like (제안)
     브랜드 클릭 시 → product-list.html?brand=브랜드ID 로 이동
================================================================ -->

  <div class="brand-head">
    <div>
      <p class="kicker">Brands</p>
      <h3>브랜드</h3>
    </div>
    <span class="total-count">총 <b data-role="total">0</b>개 브랜드</span>
  </div>

  <!-- 초성/알파벳 필터 -->
  <div class="brand-filter" data-role="filter">
    <button type="button" class="is-active" data-initial="all">전체</button>
    <button type="button" data-initial="ㄱ">ㄱ</button>
    <button type="button" data-initial="ㄴ">ㄴ</button>
    <button type="button" data-initial="ㄷ">ㄷ</button>
    <button type="button" data-initial="ㅁ">ㅁ</button>
    <button type="button" data-initial="ㅇ">ㅇ</button>
    <button type="button" data-initial="ㅍ">ㅍ</button>
    <button type="button" data-initial="A-Z">A-Z</button>
  </div>

  <!-- 브랜드 그리드 -->
  <div class="brand-grid" data-role="brand-grid"></div>

  <!-- 결과 없음 -->
  <div class="brand-empty" data-role="brand-empty" hidden>
    <p>해당하는 브랜드가 없습니다.</p>
  </div>

<!-- ▲▲▲ 여기까지 ▲▲▲ -->
