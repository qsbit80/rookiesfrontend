# =============================================================
#  캐치캐치 — 로컬 통합용 nginx 설정
#  프론트(정적 HTML/CSS/JS) 서빙 + 백엔드(Spring Boot) API 프록시를
#  하나의 origin(http://localhost) 으로 묶는다.
#
#  실행 방법 (nginx 설치 폴더에서):
#    nginx -p . -c "D:/final_project/frontend/deploy/nginx.local.conf"
#  중지:
#    nginx -s stop
#  설정만 바꿨을 때 재적용:
#    nginx -s reload
# =============================================================

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;      # nginx 설치폴더의 conf/mime.types (상대경로)
    default_type  application/octet-stream;
    sendfile      on;
    charset       utf-8;

    # 백엔드(WAS) — 로컬 Spring Boot. 포트를 바꾸면 여기만 수정.
    upstream catchcatch_backend {
        server 127.0.0.1:8080;
    }

    server {
        listen       80;
        server_name  localhost;

        # ── 1) 프론트 정적 파일 ──────────────────────────────
        root   D:/final_project/frontend;
        index  index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # ── 2) 백엔드 REST API 프록시 ────────────────────────
        # 프론트가 /api/v1/... 상대경로로 호출하므로 그대로 백엔드로 넘긴다.
        location /api/v1/ {
            proxy_pass http://catchcatch_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 3) 업로드 파일 서빙 (was-01 로컬 디스크) ─────────
        location /uploads/ {
            proxy_pass http://catchcatch_backend;
            proxy_set_header Host $host;
        }

        # ── 실서버 배포 시 참고 (로컬에선 불필요) ────────────
        # 관리자 API는 사무실/VPN IP만 허용하도록 아래 블록을 위쪽에 추가.
        # (더 구체적인 경로라 /api/v1/ 보다 먼저 매치된다)
        # location /api/v1/admin/ {
        #     allow 1.2.3.4;   # 실제 관리 IP로 교체
        #     deny  all;
        #     proxy_pass http://catchcatch_backend;
        #     proxy_set_header Host            $host;
        #     proxy_set_header X-Real-IP       $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # }
    }
}
