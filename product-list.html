<main class="wrap plist-page">

<!-- ▼▼▼ 상품목록 =====================================
     기능정의서 매핑
     - U-MAIN-001 상품 리스트·검색 결과 조회 → GET /api/v1/products
     - U-MAIN-003 카테고리 목록 조회         → GET /api/v1/categories
     받는 파라미터: ?cat=카테고리  ?q=검색어
================================================================ -->

  <!-- 페이지 제목 -->
  <div class="plist-head">
    <div>
      <p class="kicker">Products</p>
      <h3 data-role="page-title">전체 상품</h3>
    </div>
    <span class="total-count">총 <b data-role="total">0</b>개</span>
  </div>

  <div class="plist-body">

    <!-- ===== 왼쪽 필터 ===== -->
    <aside class="plist-filter">

      <div class="filter-group">
        <h5>카테고리</h5>
        <label><input type="checkbox" data-filter="cat" value="outer"> 아우터</label>
        <label><input type="checkbox" data-filter="cat" value="top"> 상의</label>
        <label><input type="checkbox" data-filter="cat" value="shirts"> 셔츠</label>
        <label><input type="checkbox" data-filter="cat" value="knit"> 니트</label>
        <label><input type="checkbox" data-filter="cat" value="pants"> 팬츠</label>
        <label><input type="checkbox" data-filter="cat" value="denim"> 데님</label>
        <label><input type="checkbox" data-filter="cat" value="shoes"> 신발</label>
        <label><input type="checkbox" data-filter="cat" value="bag"> 가방</label>
        <label><input type="checkbox" data-filter="cat" value="acc"> 액세서리</label>
      </div>

      <div class="filter-group">
        <h5>가격</h5>
        <label><input type="checkbox" data-filter="price" value="0-30000"> 3만원 이하</label>
        <label><input type="checkbox" data-filter="price" value="30000-50000"> 3~5만원</label>
        <label><input type="checkbox" data-filter="price" value="50000-100000"> 5~10만원</label>
        <label><input type="checkbox" data-filter="price" value="100000-"> 10만원 이상</label>
      </div>

      <div class="filter-group">
        <h5>사이즈</h5>
        <div class="size-chips">
          <label><input type="checkbox" data-filter="size" value="S"><span>S</span></label>
          <label><input type="checkbox" data-filter="size" value="M"><span>M</span></label>
          <label><input type="checkbox" data-filter="size" value="L"><span>L</span></label>
          <label><input type="checkbox" data-filter="size" value="XL"><span>XL</span></label>
        </div>
      </div>

      <button type="button" class="btn-outline btn-reset" data-action="reset-filter">필터 초기화</button>
    </aside>

    <!-- ===== 오른쪽 상품 목록 ===== -->
    <section class="plist-main">

      <!-- 정렬 -->
      <div class="plist-toolbar">
        <select data-role="sort">
          <option value="popular">인기순</option>
          <option value="new">최신순</option>
          <option value="low">낮은 가격순</option>
          <option value="high">높은 가격순</option>
          <option value="review">리뷰 많은순</option>
        </select>
      </div>

      <!-- 상품 카드가 들어갈 자리 (JS가 채움) -->
      <div class="product-grid" data-role="product-grid">
        <!-- JS로 생성 -->
      </div>

      <!-- 결과 없을 때 -->
      <div class="empty-msg" data-role="empty" hidden>
        <p>검색 결과가 없습니다.</p>
      </div>

      <!-- 페이지네이션 -->
      <nav class="pagination" data-role="pagination">
        <!-- JS로 생성 -->
      </nav>

    </section>
  </div>

<!-- ▲▲▲ 여기까지 ▲▲▲ -->

</main>
