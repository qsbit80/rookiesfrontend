<main class="wrap review-page">

<!-- ▼▼▼ 리뷰 작성 =====================================
     기능정의서 매핑
     - U-REVIEW-001 리뷰 작성
       → POST /api/v1/products/{productId}/reviews
       ※ 구매확정한 주문에 대해서만 작성 가능
     받는 파라미터: ?orderId=주문번호
================================================================ -->

  <div class="review-head">
    <div>
      <p class="kicker">Review</p>
      <h3>리뷰 작성</h3>
    </div>
  </div>

  <!-- 대상 상품 정보 -->
  <div class="review-product">
    <div class="rp-thumb">
      <img data-role="product-image" src="" alt="상품 이미지">
    </div>
    <div class="rp-info">
      <p class="rp-brand" data-role="product-brand">브랜드</p>
      <p class="rp-name" data-role="product-name">상품명</p>
      <p class="rp-option" data-role="product-option">사이즈 · 가격</p>
    </div>
  </div>

  <form id="reviewForm" class="review-form" novalidate>

    <!-- 별점 -->
    <div class="form-block">
      <label class="block-label">별점 <span class="req">*</span></label>
      <div class="star-rating" data-role="star-rating">
        <button type="button" data-star="1" aria-label="1점">★</button>
        <button type="button" data-star="2" aria-label="2점">★</button>
        <button type="button" data-star="3" aria-label="3점">★</button>
        <button type="button" data-star="4" aria-label="4점">★</button>
        <button type="button" data-star="5" aria-label="5점">★</button>
        <span class="star-text" data-role="star-text">별점을 선택해 주세요</span>
      </div>
    </div>

    <!-- 사이즈 평가 -->
    <div class="form-block">
      <label class="block-label">사이즈는 어떠셨나요?</label>
      <div class="chip-group" data-role="size-fit">
        <button type="button" data-fit="small">작아요</button>
        <button type="button" data-fit="normal">정사이즈</button>
        <button type="button" data-fit="large">커요</button>
      </div>
    </div>

    <!-- 리뷰 내용 -->
    <div class="form-block">
      <label class="block-label" for="reviewBody">리뷰 내용 <span class="req">*</span></label>
      <textarea id="reviewBody" rows="8"
                placeholder="상품은 어떠셨나요? 다른 고객님께 도움이 되도록 솔직한 후기를 남겨주세요. (최소 10자)"
                maxlength="500"></textarea>
      <div class="char-count">
        <span data-role="char-now">0</span>/500
      </div>
    </div>

    <!-- 사진 첨부 -->
    <div class="form-block">
      <label class="block-label">사진 첨부 <span class="optional">(선택 · 최대 5장)</span></label>
      <div class="photo-area">
        <label class="photo-add" data-role="photo-add">
          <input type="file" accept="image/*" multiple hidden data-role="photo-input">
          <span>＋</span>
          <small>사진 추가</small>
        </label>
        <div class="photo-list" data-role="photo-list"></div>
      </div>
    </div>

    <!-- 버튼 -->
    <div class="form-actions">
      <button type="button" class="btn-cancel" data-action="cancel">취소</button>
      <button type="submit" class="btn-submit">등록하기</button>
    </div>

  </form>

<!-- ▲▲▲ 여기까지 ▲▲▲ -->
