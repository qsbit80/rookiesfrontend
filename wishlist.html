<main class="wrap wish-page">

<!-- ▼▼▼ 위시리스트 =====================================
     기능정의서 매핑
     - U-HEAD-002  위시리스트 이동 (비로그인 시 로그인 페이지로)
     - U-WISH-001  위시리스트 목록 조회
       ⚠️ 백엔드 API 추가 필요 (제안: GET /api/v1/users/me/wishlist)
          현재 명세에는 좋아요 등록·해제 API만 있음
     - U-PROD-004  찜 해제 → POST /api/v1/products/{productId}/like
================================================================ -->

  <div class="wish-head">
    <div>
      <p class="kicker">Wishlist</p>
      <h3>위시리스트</h3>
    </div>
    <span class="total-count">총 <b data-role="total">0</b>개</span>
  </div>

  <!-- 찜한 상품이 있을 때 -->
  <div data-role="wish-body">

    <!-- 툴바 -->
    <div class="wish-toolbar">
      <label class="check-all">
        <input type="checkbox" data-action="check-all">
        <span>전체선택 (<b data-role="checked-count">0</b>/<span data-role="total-count2">0</span>)</span>
      </label>
      <div class="toolbar-btns">
        <button type="button" class="btn-outline" data-action="add-cart-checked">선택상품 장바구니 담기</button>
        <button type="button" class="btn-text" data-action="delete-checked">선택삭제</button>
      </div>
    </div>

    <!-- 상품 그리드 (JS가 채움) -->
    <div class="wish-grid" data-role="wish-grid"></div>

  </div>

  <!-- 찜한 상품이 없을 때 -->
  <div class="wish-empty" data-role="wish-empty" hidden>
    <p>찜한 상품이 없습니다.</p>
    <a href="product-list.html" class="btn-primary">쇼핑하러 가기</a>
  </div>

<!-- ▲▲▲ 여기까지 ▲▲▲ -->

</main>
